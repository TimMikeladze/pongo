# fly.toml app configuration file generated for pongo-production on 2025-12-07T12:05:27-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pongo-production'
primary_region = 'sjc'

[build]

[processes]
  nextjs = "bun run start"
  scheduler = "bun run src/scheduler/index.ts"
  archiver = "bun run src/archiver/index.ts"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['nextjs']

# Health checks for nextjs (via http_service)
[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/"

# Health checks for scheduler
[[services]]
  processes = ['scheduler']
  internal_port = 3001
  protocol = "tcp"

  [[services.http_checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

# Health checks for archiver
[[services]]
  processes = ['archiver']
  internal_port = 3002
  protocol = "tcp"

  [[services.http_checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  processes = ['nextjs']
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[[vm]]
  processes = ['scheduler']
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

[[vm]]
  processes = ['archiver']
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
