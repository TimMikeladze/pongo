# fly.toml app configuration file generated for pongo-production on 2025-12-07T12:05:27-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pongo-production'
primary_region = 'sjc'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/"

[mounts]
  source = "pongo_data"
  destination = "/data"
  initial_size = "1gb"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
