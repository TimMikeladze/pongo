# fly.toml app configuration file generated for pongo-production on 2025-12-08T21:45:33-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pongo-production'
primary_region = 'sjc'

[build]

[[mounts]]
  source = 'pongo_data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/'

[scale]
  count = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
